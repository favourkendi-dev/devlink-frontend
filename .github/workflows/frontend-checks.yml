name: Frontend Checks

# Run this workflow every time code is pushed or a PR is opened
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code from the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install dependencies using package-lock.json
      - name: Install dependencies
        run: npm ci

      # Step 4: Run ESLint to catch code issues
      - name: Run lint
        run: npm run lint

      # Step 5: Make sure the app actually builds successfully
      - name: Build project
        run: npm run build
